<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Real Estate Admin Portal | Property Management Dashboard</title>
  <!-- Google Fonts & simple CSS reset -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="Style2.css">
  
</head>
<body>
<div class="app-container">
  <!-- Sidebar (persistent across pages) -->
  <aside class="sidebar">
    <div class="logo-area">
      <h2><i class="fas fa-building"></i><span>Estata</span></h2>
      <p>real estate admin</p>
    </div>
    <div class="nav-links">
      <div class="nav-item" data-page="dashboard">
        <i class="fas fa-tachometer-alt"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" data-page="properties">
        <i class="fas fa-home"></i>
        <span>Properties</span>
      </div>
      <div class="nav-item" data-page="tenants">
        <i class="fas fa-users"></i>
        <span>Tenants</span>
      </div>
    </div>
    <div style="padding: 24px 20px 30px;">
      <div style="background: #1f4a58; border-radius: 20px; padding: 12px; text-align: center; font-size: 0.75rem;">
        <i class="fas fa-database"></i> v2.0 · secure
      </div>
    </div>
  </aside>

  <!-- Main dynamic panel -->
  <main class="main-panel">
    <div class="top-bar" id="dynamicTopBar">
      <div class="page-title">
        <h1 id="pageMainTitle">Property Dashboard</h1>
        <p id="pageSubTitle">Overview & organization</p>
      </div>
      <div class="admin-badge">
        <i class="fas fa-user-shield"></i> Admin · RE Firm
      </div>
    </div>
    <div class="content-area" id="dynamicContent">
      <!-- content injected by JS -->
    </div>
  </main>
</div>

<!-- MODAL STRUCTURE -->
<div id="propertyModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h3><i class="fas fa-info-circle"></i> Property Details</h3>
      <button class="close-modal" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-body" id="modalBodyContent">
      <!-- Dynamic content here -->
    </div>
    <div class="modal-footer">
      <button class="btn-close" id="modalCloseFooterBtn">Close</button>
    </div>
  </div>
</div>
<script src="Script.js"></script>
</body>
</html>
